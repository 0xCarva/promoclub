<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ofertas — PromoClub</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],mono:['Geist Mono','monospace']}}}}</script>
<style>
body{font-family:'Inter',sans-serif;background:#080b14}
.gold-gradient{background:linear-gradient(135deg,#c9a84c,#f5d078)}
.gold-text{background:linear-gradient(135deg,#c9a84c,#f5d078);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-blur{background:rgba(8,11,20,0.9);backdrop-filter:blur(20px)}
.card-hover{transition:transform .2s,box-shadow .2s}
.card-hover:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.5)}
</style>
</head>
<body class="text-gray-100 min-h-screen">

<nav class="nav-blur sticky top-0 z-50 border-b border-white/5">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 flex items-center gap-3 h-14">
    <a href="index.html" class="flex-shrink-0 mr-3">PromoClub</a>
    <a href="ofertas.html" class="text-yellow-300">Ofertas</a>
    <a href="cupons.html">Cupons</a>
  </div>
</nav>

<div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
  <h1 class="text-3xl font-bold mb-6">Todas as Ofertas</h1>
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6" id="productsGrid"></div>
</div>

<script src="shared.js"></script>
<script>
async function init() {
  const produtos = await loadProdutos();
  console.log("Produtos carregados:", produtos.length);

  const grid = document.getElementById('productsGrid');
  grid.innerHTML = produtos.map(p => `
    <div class="card-hover bg-gray-900 border border-white/8 rounded-xl overflow-hidden flex flex-col group">
      <div class="relative bg-gray-800 aspect-square flex items-center justify-center p-4">
        <img src="${p.image}" alt="${p.title}" class="max-h-full object-contain transition-transform group-hover:scale-105" onerror="this.src='https://via.placeholder.com/300?text=Sem+Imagem'">
        <span class="absolute top-3 left-3 bg-red-600 text-white text-xs px-2 py-1 rounded font-bold">${p.store}</span>
      </div>
      <div class="p-4 flex-1 flex flex-col">
        <div class="text-white font-medium line-clamp-2 mb-3">${p.title}</div>
        <div class="mt-auto">
          <div class="text-2xl font-bold text-white">${p.price}</div>
          <a href="${p.link}" target="_blank" class="mt-4 block text-center bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-3 rounded-lg transition">Ver Oferta</a>
        </div>
      </div>
    </div>
  `).join('') || '<p class="col-span-full text-center py-12 text-gray-500">Nenhum produto encontrado</p>';
}

init();
</script>
</body>
</html>
