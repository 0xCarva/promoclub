name: Atualizar Hinode

on:
  schedule:
    - cron: '0 11 * * *'      # Todo dia às 11h
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_GITHUB }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Rodar script Hinode
        run: python scripts/update_hinode.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet produtos.json; then
            echo "✅ Nenhum produto novo da Hinode."
          else
            git add produtos.json
            git commit -m "🌸 Atualização automática Hinode - $(date +'%d/%m/%Y %H:%M')"
            git push
            echo "✅ Hinode atualizada!"
          fi
