name: Atualizar Produtos (Amazon)

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # ← importante

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Rodar script de atualização
        run: python scripts/update_site.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet produtos.json; then
            echo "✅ Nenhum produto novo. Nada para commitar."
          else
            git add produtos.json
            git commit -m "🔄 Atualização automática de produtos Amazon - $(date +'%d/%m/%Y %H:%M')"
            git push
            echo "✅ Produtos atualizados e commitado com sucesso!"
          fi
