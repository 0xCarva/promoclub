name: Atualizar Produtos Diariamente

on:
  schedule:
    - cron: '0 9 * * *'     
  workflow_dispatch:        

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4  # adicione aqui as bibliotecas que seu script usa

      - name: Rodar script Python
        run: python scripts/update_produtos.py   # mude se o nome/caminho for diferente

      - name: Commit e Push se houver mudanças
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualização automática de produtos - $(date +'%d/%m/%Y')"
          file_pattern: produtos.json
